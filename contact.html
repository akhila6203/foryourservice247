<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Contact Us</title>

  <!-- GOOGLE FONT -->

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->

  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/contact.css">

</head>

<body>

  <!-- HEADER -->

  <div id="header"></div>

  <!-- ================= CONTACT SECTION ================= -->

  <section class="contact-section">

    <div class="container contact-container">

      <!-- LEFT -->

      <div class="contact-form-box">
        <h2>
          We Love To Hear From You
        </h2>
        <p>
          Please call or email contact form and we will be
          happy to assist you.
        </p>
        <form>
          <div class="form-grid">
            <input
              type="text"
              placeholder="First Name:"
            >
            <input
              type="text"
              placeholder="Last Name:"
            >
            <input
              type="email"
              placeholder="Your mail:"
            >
            <input
              type="text"
              placeholder="Your Phone:"
            >
            <input
              type="text"
              placeholder="Your Company:"
            >
            <input
              type="text"
              placeholder="Subject:"
            >
          </div>
          <textarea placeholder="Message:"></textarea>
          <button type="submit">
            SEND MESSAGE
          </button>
        </form>
      </div>

      <!-- RIGHT -->

      <div class="contact-right">
        <!-- MAP -->
        <div class="map-box">
          <iframe
            src="https://maps.google.com/maps?q=Splendour%20Apartment%20C%20Block%201st%20floor%20101%20Near%20Usha%20Mullapudi%20hospital%20Quthbullapur%20Telangana%20500055&t=&z=15&ie=UTF8&iwloc=&output=embed"
            allowfullscreen=""
            loading="lazy"
          ></iframe>
        </div>

        <!-- CONTACT INFO -->
        <div class="contact-info">
          <h3>
            Contact Info
          </h3>
          <div class="info-grid">

            <!-- ADDRESS -->

            <div>
              <p>
                <strong>Address:</strong>
                Splendour Apartment C Block 1st floor 101
                Near Usha Mullapudi hospital Quthbullapur Telangana 500055.
              </p>
            </div>
            <!-- CONTACT -->
            <div>
              <p>
                <strong>Phone:</strong>
                 94931 87178
              </p>

              <p>
                <strong>Email:</strong>
                foryourservice247@gmail.com
              </p>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <div id="footer"></div>

  <!-- JS -->

  <script src="js/header-footer.js"></script>

</body>

</html>
